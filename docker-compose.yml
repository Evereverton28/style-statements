# Optional local orchestration. Backend uses SQLite by default (no db service
# needed); uncomment the postgres block and set DATABASE_URL to switch.
version: "3.9"
services:
  backend:
    build: ./backend
    ports: ["5000:5000"]
    environment:
      - FLASK_ENV=development
      - CORS_ORIGINS=http://localhost:5173
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    ports: ["5173:5173"]
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on: [backend]

